notes: >-
  Three test-to-failure experiments monitor four bearings on one shaft at 2000
  RPM and 6000 lb radial load. Set 1 has two directions per bearing (8 channels);
  Sets 2 and 3 have one channel per bearing (4 channels). The README calls each
  file a one-second snapshot, but 20480 samples at 20 kHz imply 1.024 seconds.
  The 2006 paper reports 20-minute acquisition for its experiment whereas the
  released README reports 10-minute intervals for most of Set 1 and all of Sets
  2 and 3. At Set 1 endpoint, bearing 4 has simultaneous roller-element and
  outer-race damage, meeting the internal compound definition. Hardware ADC
  simultaneity, exact mounting, released temperature channels, and license
  applicability to IMS-origin files remain Unknown.
