notes: >-
  Fifteen bearings are run to failure under three constant-per-run operating
  conditions. Two accelerometers measure horizontal and vertical directions on
  the same tested-bearing housing, so this is multi-direction but not verified
  multi-position acquisition. Snapshots contain 32768 samples per channel at
  25.6 kHz (1.28 s) every one minute. The paper uses horizontal vibration for
  RUL because the radial load is applied horizontally. Dataset release date,
  file format, license, DAQ, and hardware simultaneous-sampling architecture
  remain Unknown.
