notes: >-
  The supporting S1 Data contains original diagnostic signals at 2000 RPM. The
  article verifies IR+OR, IR+rolling-element, OR+rolling-element, and triple
  IR+OR+rolling-element experiments, with 20 groups per fault type and 12000
  points per group at 12 kHz. Fig. 9 labels two uniaxial acceleration sensors at
  the support and faulty bearings plus one three-way accelerometer at the gearbox,
  supporting five vibration axes across three positions. Exact axes, models, DAQ,
  mounting, stored column schema, and simultaneous timing remain Unknown. Gear
  meshing and shaft/coupling effects are interference, not introduced gear or
  rotor fault labels.
