notes: >-
  The official HUSTbearing README reports 9 health states and 11 operating
  conditions: ten constant-speed conditions from 20 to 80 Hz plus one 0-40-0 Hz
  time-varying condition. RPM values above are project conversions from Hz to
  RPM, assuming the listed Hz denotes shaft rotational frequency. The README
  says the raw file's second column represents speed but is redundant for
  constant-speed records; filenames provide the correct speed. Internal
  compound coverage is limited to IR+OR combination faults with medium/severe
  severities. Exact accelerometer model/count, DAQ, mounting, channel schema,
  raw Excel columns, and license remain Unknown because raw files were not
  downloaded.
