notes: >-
  Raw archive has three nested groups named 25, 50, and 75, each with 975 CSV
  files (39 scenarios x 25 trials), for 2925 CSV files total. Each representative
  CSV has 64000 rows and nine streams with identical time intervals: Tachometer
  plus eight acceleration channels named Motor, Bearing 1 X/Y/Z, Bearing 2
  X/Y/Z, and Gearbox. Official Figshare metadata identifies the groups as 25,
  50, and 75 RPM; hardware-simultaneous ADC timing is not established. The paper's
  total of 114 CSV files conflicts with the deposited trial-level file count and
  likely refers incorrectly to scenario-speed groupings. Bearing model,
  mounting, and exact DAQ models remain Unknown. Figshare states CC BY 4.0.
