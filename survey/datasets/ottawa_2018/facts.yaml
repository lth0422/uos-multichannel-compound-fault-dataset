notes: >-
  Thirty-six ten-second records cover healthy, inner-race, and outer-race states
  under four within-record speed trajectories: increasing, decreasing,
  increasing-then-decreasing, and decreasing-then-increasing, with three trials
  per health/trajectory case. Both acceleration and encoder channels are sampled
  at 200 kHz, yielding 2 million samples per channel. This is synchronized
  vibration-plus-speed acquisition but only one vibration position. The overall
  extrema listed in the paper are 9.8-29.0 Hz (approximately 588-1740 RPM).
  Fault-generation method, load, accelerometer direction/mounting, sampling-rate
  rationale, ADC simultaneity, and dataset-file license remain Unknown. The text
  duplicates O-C-1 where O-C-3 is expected; repository inspection is required.
