notes: >-
  The release contains 240 sixty-second CSV records. Each has eight columns:
  speed key-phase, torque, and six acceleration axes from two TES001V triaxial
  sensors at the motor drive end and gearbox intermediate-shaft bearing seat.
  Compound faults are broken gear tooth plus ER16K bearing IR damage and broken
  tooth plus bearing OR damage, each at light medium and high severity. These are
  bearing-gear compounds, not internal-bearing or bearing-rotor compounds. Table
  1 reports 48 transitional conditions while Section 3 reports 112 transitional
  combinations. Exact DAQ, attachment, hardware simultaneity, and channel skew
  remain Unknown.
