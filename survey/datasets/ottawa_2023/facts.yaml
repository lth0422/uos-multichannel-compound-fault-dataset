notes: >-
  Twenty bearings were degraded, with five bearings assigned to each final fault
  type. The released 60 raw sets select healthy, developing, and faulty stages
  rather than publishing every one of roughly 50 time-ordered files per bearing,
  so released run-to-failure coverage is Partial. Each raw set has five columns:
  acceleration, acoustic, RPM, load, and temperature differential. The first
  five tests (inner-race group) use NSK 6203ZZ bearings and the remaining fifteen
  use FAFNIR 203KD; ball-fault data alone uses 0 N rather than 400 N. These are
  fault-label confounds. The article's Table 1 repeats B-12-1 in the faulty row,
  likely a label typo but unresolved without repository inspection. Dataset-file
  license, ADC simultaneity, and accelerometer direction remain Unknown.
