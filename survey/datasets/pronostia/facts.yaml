notes: >-
  The PHM 2012 challenge has 17 bearing trajectories under three fixed-per-run
  speed/load conditions. Six learning trajectories are complete run-to-failure;
  eleven test trajectories are truncated for RUL prediction, so released
  run-to-failure coverage is Partial. Acceleration is measured horizontally and
  vertically at one bearing position. Bearings have no initially seeded defects
  and may degrade across balls, rings, and cage simultaneously, establishing
  naturally developed internal compound damage without controlled component
  labels. The paper states that classical characteristic-frequency signatures
  are difficult to obtain for these mixed degradations. Snapshot duration,
  snapshot cadence, samples per snapshot, released file formats, exact bearing
  model, stopping criterion, mounting attachment, cDAQ module identities,
  hardware timing, and dataset license remain Unknown.
