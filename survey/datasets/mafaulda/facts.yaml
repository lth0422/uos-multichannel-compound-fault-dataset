notes: >-
  Official documentation reports 1951 five-second sequences sampled at 50 kHz.
  Each CSV has eight columns: tachometer, six bearing-acceleration axes, and
  microphone. Bearing-fault runs include added imbalance masses, so they meet
  this repository's bearing-rotor compound definition. The 2016 original
  publication repeatedly identifies cage, outer-race, and ball faults, resolving
  the official page's contradictory detailed labels in favor of those classes.
  The paper analyzes seven channels (six vibration plus trigger), whereas the
  current official download documentation describes an eighth microphone column.
