notes: >-
  This card covers the self-collected drivetrain dynamic simulator data, not the
  CWRU bearing dataset also analyzed in the paper. Table VI defines bearing
  Combination as simultaneous inner- and outer-ring cracks. The paper's mixture
  dataset pools separate bearing and gear fault classes and is not a same-sample
  bearing-gear compound dataset. The 1024-point windows are preprocessing samples;
  they are not recorded as raw acquisition length. Nearly all acquisition and
  repository details require an official source.
