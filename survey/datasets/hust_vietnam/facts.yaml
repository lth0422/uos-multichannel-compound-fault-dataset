notes: >-
  Internal compound labels are IR+OR, IR+Ball, and OR+Ball in the same
  artificially faulted bearing; no triple condition is reported. Ball and IR+Ball
  are missing for bearing 6204. Crack depth varies between bearings. The article
  reports 99 raw vibration signals but also describes 27 faulty plus 3 healthy
  bearings at three loads and 30 run-up records/fields; the exact file accounting
  needs repository inspection. Exact steady/run-up RPM, accelerometer attachment,
  chassis model, timing, field shapes, and dataset-file license remain Unknown.
