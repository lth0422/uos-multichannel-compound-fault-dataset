notes: >-
  Vibration channel count is four; other modality channel counts are not collapsed
  into this comparison field. Simultaneous vibration acquisition is explicit, while
  synchronization across every DAQ/modality is only Partial: synchronized speed is
  stated for the speed part, but cross-device timing/skew is not specified. The
  Specifications Table reverses NI module roles relative to the article body; the
  body assigns NI 9211 to temperature and NI 9775 to current. No same-sample
  compound-fault class is documented. Exact mounting, dataset-file license, and raw
  repository consistency remain Unknown.
