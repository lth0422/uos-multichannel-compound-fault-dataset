  duration_seconds: 60
  expected_samples_per_channel_at_25600_hz: 1536000
  status: selected for full acquisition planning
condition:
  nominal_rpm: 1400
  bearing_model: "30204"
  bearing_fault: IR
  rotor_condition: H
bearing_geometry:
  source_id: UOSV1-S01
